<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3000er CoD4 Server - FastDL & Mod Übersicht</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212;
            color: #e0e0e0;
            margin: 0;
            padding: 40px 20px;
        }
        .container {
            max-width: 950px;
            margin: 0 auto;
            background-color: #1e1e1e;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.5);
        }
        h1 {
            text-align: center;
            color: #4CAF50;
            margin-bottom: 5px;
        }
        p.description {
            text-align: center;
            color: #888;
            margin-bottom: 30px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            padding: 15px;
            text-align: left;
            border-bottom: 1px solid #333;
            vertical-align: middle;
        }
        th {
            background-color: #2a2a2a;
            color: #4CAF50;
            font-weight: bold;
        }
        tr:hover {
            background-color: #252525;
        }
        code {
            background-color: #000;
            padding: 4px 8px;
            border-radius: 4px;
            color: #64b5f6;
            font-family: monospace;
        }
        .btn-link {
            background-color: #0288d1;
            color: #fff;
            padding: 8px 16px;
            text-align: center;
            text-decoration: none;
            display: inline-block;
            border-radius: 5px;
            font-weight: bold;
            transition: background-color 0.3s;
        }
        .btn-link:hover {
            background-color: #0277bd;
        }
        #loading {
            text-align: center;
            padding: 20px;
            color: #888;
        }
        .unknown {
            color: #666;
            font-style: italic;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>3000er CoD4 FastDL Repository</h1>
        <p class="description">Übersicht unserer Server Mods und Custom Maps.</p>

        <table>
            <thead>
                <tr>
                    <th>Mod / Map</th>
                    <th>Autor</th>
                    <th>FastDL Pfad</th>
                    <th>Quelle</th>
                </tr>
            </thead>
            <tbody id="mod-table-body">
                </tbody>
        </table>
        <div id="loading">Lade Daten von GitHub...</div>
    </div>

    <script>
        // ==========================================
        // HIER DEINE GITHUB DATEN EINTRAGEN!
        // ==========================================
        const githubUser = 'Smile-2204'; 
        const githubRepo = '3000er_Cod4-Mods';
        // ==========================================

        async function fetchFolders(path, typeName) {
            const url = `https://api.github.com/repos/${githubUser}/${githubRepo}/contents/${path}`;
            try {
                const response = await fetch(url);
                if (!response.ok) return []; 
                const data = await response.json();
                
                return data.filter(item => item.type === 'dir').map(dir => {
                    return {
                        name: dir.name,
                        type: typeName,
                        path: `${path}/${dir.name}/`,
                        githubLink: dir.html_url
                    };
                });
            } catch (error) {
                console.error(`Fehler beim Laden von ${path}:`, error);
                return [];
            }
        }

        async function buildTable() {
            const mods = await fetchFolders('mods', 'Mod');
            const maps = await fetchFolders('usermaps', 'Map');
            const allItems = [...mods, ...maps];

            const tbody = document.getElementById('mod-table-body');
            const loading = document.getElementById('loading');

            if (allItems.length === 0) {
                loading.innerText = 'Keine Mods/Maps gefunden. (User/Repo-Namen prüfen!)';
                return;
            }

            loading.style.display = 'none';

            // Gehe jeden gefundenen Ordner durch
            for (const item of allItems) {
                let author = '<span class="unknown">Unbekannt</span>';
                let sourceLink = item.githubLink; // Fallback: GitHub Ordner
                let linkText = 'GitHub Ordner';

                // Versuche die about.json Datei im jeweiligen Ordner zu laden
                try {
                    const metaResponse = await fetch(`${item.path}about.json`);
                    if (metaResponse.ok) {
                        const meta = await metaResponse.json();
                        if (meta.author) author = meta.author;
                        if (meta.link) {
                            sourceLink = meta.link;
                            linkText = 'Zur Mod-Seite';
                        }
                    }
                } catch (e) {
                    // Falls keine Datei da ist, einfach ignorieren und Fallbacks nutzen
                }

                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td><strong>${item.name}</strong><br><small style="color:#888">${item.type}</small></td>
                    <td>${author}</td>
                    <td><code>${item.path}</code></td>
                    <td><a href="${sourceLink}" class="btn-link" target="_blank">${linkText}</a></td>
                `;
                tbody.appendChild(tr);
            }
        }

        buildTable();
    </script>
</body>
</html>
